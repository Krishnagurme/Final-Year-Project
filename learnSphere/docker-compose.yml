version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: learnsphere-mongodb
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: learnsphere
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - learnsphere-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: learnsphere-backend
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      MONGODB_URI: mongodb://admin:admin123@mongodb:27017/learnsphere?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DEEPTUTOR_API_URL: http://deeptutor:8001/api/v1
      PORT: 5000
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    networks:
      - learnsphere-network
    restart: unless-stopped

  deeptutor:
    build:
      context: ../DeepTutor
      dockerfile: Dockerfile
    container_name: learnsphere-deeptutor
    ports:
      - '8000:8001'
    environment:
      BACKEND_PORT: 8001
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    networks:
      - learnsphere-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: learnsphere-frontend
    ports:
      - '3000:80'
    environment:
      VITE_API_BASE_URL: http://backend:5000/api
    depends_on:
      - backend
    networks:
      - learnsphere-network
    restart: unless-stopped

volumes:
  mongodb_data:
  mongodb_config:

networks:
  learnsphere-network:
    driver: bridge
